---
layout: default
---
<a class="back" href="/">← index</a>
<article>
  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="meta">{{ page.date | date: "%Y-%m-%d" }}{% if page.tags %} · {{ page.tags | join: ", " }}{% endif %}</div>
  </div>
  <div class="post-content">
    {{ content }}
  </div>
</article>
