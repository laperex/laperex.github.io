---
layout: default
---
<a class="back" href="{{ '/' | relative_url }}">← Index</a>

<article>
  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="meta">
      <span>{{ page.date | date: "%Y-%m-%d" }}</span>
      {% if page.reading_time %}<span>{{ page.reading_time }} min read</span>{% endif %}
      {% if page.tags %}
        {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
      {% endif %}
    </div>
  </div>

  <div class="post-content">
    {{ content }}
  </div>
</article>
